name: ivg-app

services:
  app:
    build: .
    container_name: ivg_next_app
    ports:
      - "3000:3000"
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - app-network
    volumes:
      - /app/node_modules

  postgres:
    image: postgres:15
    container_name: ivg_postgres
    restart: always
    environment:
      NODE_ENV: production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ivg_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  prisma-studio:
    build: .
    container_name: ivg_prisma_studio
    command: npx prisma studio --hostname 0.0.0.0 --port 5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: