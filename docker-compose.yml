name: ivg-app

services:
  app:
    build: ./
    container_name: ivg_next_app

    ports:
      - "3000:3000"

    restart: always

    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
      NEXT_TELEMETRY_DISABLED: "1"
      

    env_file:
      - .env

    depends_on:
      - postgres

    networks:
      - app-network

    volumes:
      - .:/app
      - /app/node_modules
   

    command: npm run dev 

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:15
    container_name: ivg_postgres

    restart: always

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - app-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  prisma-studio:
    build: .
    container_name: ivg_prisma_studio

    command: npx prisma studio --hostname 0.0.0.0 --port 5555

    ports:
      - "5555:5555"

    env_file:
      - .env

    depends_on:
      - postgres

    networks:
      - app-network

    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: